name: OSART Plugin CI

# Trigger on PRs and manual dispatch
on:
  pull_request:
    branches: ["**"]
    paths:
      - "plugins/osart/**"
      - ".github/workflows/osart_ci.yml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR Number (optional, for commenting)"
        required: false
        type: number

env:
  CYPRESS_BROWSER: "chromium"
  CYPRESS_MEMORY_LIMIT: "12288"
  CYPRESS_CACHE_FOLDER: "${{ github.workspace }}/.cypress-cache"
  # Optimize Chrome
  CYPRESS_CHROME_ARGS: >-
    --disable-dev-shm-usage
    --no-sandbox
    --disable-gpu
    --disable-software-rasterizer
    --js-flags="--max-old-space-size=12288"
  OSD_SNAPSHOT_SKIP_VERIFY_CHECKSUM: true
  OSD_OPTIMIZER_MAX_WORKERS: 12
  NODE_OPTIONS: "--max-old-space-size=12288 --max-semi-space-size=128 --dns-result-order=ipv4first"
  LATEST_VERSION: '3.3.0'
  COMMENT_TAG: "[OSART CI TEST RESULTS]"
  COMMENT_SUCCESS_MSG: ":white_check_mark: OSART CI test run succeeded!"
  COMMENT_FAILURE_MSG: ":x: OSART CI test run failed!"

jobs:
  osart-tests:
    name: Run OSART Cypress Tests
    runs-on: ubuntu-latest
    container:
      image: docker://opensearchstaging/ci-runner:ci-runner-rockylinux8-opensearch-dashboards-integtest-v2
      options: "--user 1001 --shm-size=4g"
    env:
      START_CMD: 'node scripts/opensearch_dashboards --dev --no-base-path --no-watch --savedObjects.maxImportPayloadBytes=10485760 --server.maxPayloadBytes=1759977 --logging.json=false --data.search.aggs.shardDelay.enabled=true --csp.warnLegacyBrowsers=false --home.disableExperienceModal=true --opensearch.ignoreVersionMismatch=true'
      # prevents extra Cypress installation progress messages
      CI: 1
      # avoid warnings like "tput: No value for $TERM and no -T specified"
      TERM: xterm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@^1.22.10
          yarn config set network-timeout 1000000 -g

      - name: Run bootstrap
        run: yarn osd bootstrap

      - name: Build osart plugin
        if: success()
        run: |
          cd plugins/osart
          yarn build

      - name: Setup Cypress symlink for osart tests
        if: success()
        run: |
          cd plugins/osart
          yarn cypress:link

      - name: Download OpenSearch
        if: success()
        uses: suisei-cn/actions-download-file@v1.4.0
        with:
          url: https://artifacts.opensearch.org/releases/bundle/opensearch/${{ env.LATEST_VERSION }}/opensearch-${{ env.LATEST_VERSION }}-linux-x64.tar.gz

      - name: Extract OpenSearch
        if: success()
        run: |
          tar -xzf opensearch-*.tar.gz
          rm -f opensearch-*.tar.gz
        shell: bash

      - name: Remove security plugin and plugins that depend on security
        if: success()
        run: |
          /bin/bash -c "yes | ./opensearch-${{ env.LATEST_VERSION }}/bin/opensearch-plugin remove opensearch-skills"
          /bin/bash -c "yes | ./opensearch-${{ env.LATEST_VERSION }}/bin/opensearch-plugin remove opensearch-ml"
          /bin/bash -c "yes | ./opensearch-${{ env.LATEST_VERSION }}/bin/opensearch-plugin remove opensearch-anomaly-detection"
          /bin/bash -c "yes | ./opensearch-${{ env.LATEST_VERSION }}/bin/opensearch-plugin remove opensearch-security"
        shell: bash

      - name: Configure OpenSearch for index creation
        if: success()
        run: |
          echo "action.auto_create_index: true" >> ./opensearch-${{ env.LATEST_VERSION }}/config/opensearch.yml
          echo "cluster.routing.allocation.disk.threshold_enabled: false" >> ./opensearch-${{ env.LATEST_VERSION }}/config/opensearch.yml
        shell: bash

      - name: Start OpenSearch
        if: success()
        run: |
          /bin/bash -c "./opensearch-${{ env.LATEST_VERSION }}/opensearch-tar-install.sh &"
          sleep 30
        shell: bash

      - name: Get Cypress version
        if: success()
        id: cypress_version
        run: |
          echo "name=cypress_version::$(cat ./package.json | jq '.devDependencies.cypress' | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Cache Cypress
        if: success()
        id: cache-cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-cache-v2-${{ runner.os }}-${{ hashFiles('**/package.json') }}
        env:
          CYPRESS_INSTALL_BINARY: ${{ steps.cypress_version.outputs.cypress_version }}
      - name: List Cypress cache
        if: success()
        run: npx cypress cache list
      - name: Show Cypress cache path
        if: success()
        run: npx cypress cache path

      - name: Setup osart Cypress test specs
        if: success()
        shell: bash
        run: |
          DASHBOARDS_SPEC="$(yarn --silent osd:ciGroup18Osart)"
          echo "DASHBOARDS_SPEC=${DASHBOARDS_SPEC}" >> $GITHUB_ENV
          echo "DASHBOARDS_SPEC=${DASHBOARDS_SPEC}"

      - name: Clear Cypress Cache
        if: success()
        run: npx cypress cache clear

      - name: Run OSART Cypress tests
        if: success()
        uses: cypress-io/github-action@v6
        with:
          install-command: npx cypress install --force
          start: ${{ env.START_CMD }}
          wait-on: "http://localhost:9200, http://localhost:5601"
          command: yarn cypress:run-without-security --browser ${{ env.CYPRESS_BROWSER }} --spec $DASHBOARDS_SPEC

      - name: Compress Cypress artifacts
        if: always()
        run: |
          mkdir -p osart-artifacts
          for dir in screenshots videos results; do
            if [ -d "cypress/$dir" ]; then
              cp -r "cypress/$dir" osart-artifacts/
            fi
          done
          tar -czf osart-cypress-artifacts.tar.gz -C osart-artifacts .
        shell: bash

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osart-cypress-artifacts
          path: osart-cypress-artifacts.tar.gz
          retention-days: 1
          overwrite: true

  add-comment:
    needs: [osart-tests]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.pr_number != '' }}
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Find Comment
        uses: peter-evans/find-comment@v2
        id: fc
        with:
          issue-number: ${{ inputs.pr_number }}
          comment-author: "github-actions[bot]"
          body-includes: "${{ env.COMMENT_TAG }}"

      - name: Add comment on the PR
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ inputs.pr_number }}
          body: |
            ### ${{ env.COMMENT_TAG }}

            #### ${{ needs.osart-tests.result == 'success' && env.COMMENT_SUCCESS_MSG || env.COMMENT_FAILURE_MSG }}

            #### Link to results:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          edit-mode: replace
